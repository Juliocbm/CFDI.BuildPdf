name: build

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # SourceLink necesita el historial completo
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet restore CFDI.BuildPdf.sln
      - run: dotnet build CFDI.BuildPdf.sln -c Release --no-restore -p:ContinuousIntegrationBuild=true
      - run: dotnet test CFDI.BuildPdf.sln -c Release --no-build --collect:"XPlat Code Coverage"

  publish:
    needs: build-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      id-token: write   # OIDC para NuGet Trusted Publishing (sin API key)
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet pack CFDI.BuildPdf/CFDI.BuildPdf.csproj -c Release -p:ContinuousIntegrationBuild=true -o ./artifacts
      # Trusted Publishing: intercambia el token OIDC de GitHub por una API key temporal (1h) de nuget.org.
      # Requiere una política de Trusted Publishing en nuget.org (Repository Owner=Juliocbm, Repository=CFDI.BuildPdf, Workflow File=build.yml).
      - name: NuGet login (OIDC -> API key temporal)
        uses: NuGet/login@v1
        id: login
        with:
          user: JCBautistaM
      - name: NuGet push (con diagnostico)
        shell: bash
        run: |
          set +e
          out=$(dotnet nuget push "./artifacts/*.nupkg" --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate 2>&1)
          code=$?
          echo "$out"
          if [ $code -ne 0 ]; then
            echo "::error::nuget push fallo (exit $code): $(echo "$out" | grep -iE 'error|status code|forbidden|conflict|denied|unauthor|not found|exception|invalid|api key' | tail -6 | tr '\n' ' / ')"
          fi
          exit $code
